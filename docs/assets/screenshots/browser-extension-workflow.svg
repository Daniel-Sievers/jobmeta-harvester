<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">JobMeta Browser Extension Workflow</title>
  <desc id="desc">Neutral mockup showing a job page clipped into JobMeta dashboard through a browser extension popup.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#172033" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg{fill:#f5f7fb}.panel{fill:#fff;stroke:#d8dee9;stroke-width:1.2;filter:url(#shadow)}.muted{fill:#667085;font-family:Inter,Arial,sans-serif;font-size:16px}.small{fill:#667085;font-family:Inter,Arial,sans-serif;font-size:13px}.title{fill:#172033;font-family:Inter,Arial,sans-serif;font-weight:700;font-size:22px}.h2{fill:#172033;font-family:Inter,Arial,sans-serif;font-weight:700;font-size:17px}.pill{fill:#eaf4ff;stroke:#b8d8ff}.pill2{fill:#edf7f1;stroke:#bde0c8}.pill3{fill:#fff4e6;stroke:#ffd7a8}.line{stroke:#c8d0dc;stroke-width:2;fill:none}.accent{fill:#2f7dd3}.green{fill:#219653}.orange{fill:#f2994a}.field{fill:#f8fafc;stroke:#e3e8ef}.button{fill:#2f7dd3}.buttonText{fill:#fff;font-family:Inter,Arial,sans-serif;font-weight:700;font-size:14px}.mono{fill:#2f3645;font-family:ui-monospace,Consolas,monospace;font-size:13px}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8a97aa"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="620" rx="28"/>
  <text class="title" x="48" y="54">Browser-Clipper: einzelne Jobanzeige an JobMeta senden</text>
  <text class="muted" x="48" y="82">Keine Plattform-Crawls: Die Erweiterung liest nur die geöffnete Seite nach Klick aus.</text>

  <rect class="panel" x="48" y="128" width="318" height="382" rx="20"/>
  <text class="h2" x="76" y="166">1. Stellenanzeige öffnen</text>
  <rect x="76" y="192" width="262" height="42" rx="10" fill="#edf2f7"/>
  <circle cx="97" cy="213" r="7" fill="#ff6b6b"/><circle cx="118" cy="213" r="7" fill="#f7c948"/><circle cx="139" cy="213" r="7" fill="#35c46b"/>
  <rect x="76" y="252" width="262" height="36" rx="8" class="field"/>
  <text class="mono" x="94" y="275">Technical Writer</text>
  <rect x="76" y="302" width="190" height="18" rx="5" fill="#e9edf5"/>
  <rect x="76" y="332" width="238" height="14" rx="4" fill="#e9edf5"/>
  <rect x="76" y="356" width="214" height="14" rx="4" fill="#e9edf5"/>
  <rect x="76" y="380" width="246" height="14" rx="4" fill="#e9edf5"/>
  <rect x="76" y="424" width="124" height="28" rx="14" class="pill"/>
  <text class="small" x="92" y="443">JobPosting JSON-LD</text>
  <text class="small" x="76" y="486">Quelle: LinkedIn, StepStone, Indeed, XING, Workday ...</text>

  <path class="line" d="M385 318 C420 318 420 318 455 318" marker-end="url(#arrow)"/>

  <rect class="panel" x="464" y="110" width="244" height="418" rx="20"/>
  <text class="h2" x="492" y="148">2. Clipper prüfen</text>
  <rect x="492" y="176" width="188" height="38" rx="10" class="field"/>
  <text class="small" x="508" y="200">Titel erkannt</text>
  <rect x="492" y="226" width="188" height="38" rx="10" class="field"/>
  <text class="small" x="508" y="250">Firma erkannt</text>
  <rect x="492" y="276" width="188" height="38" rx="10" class="field"/>
  <text class="small" x="508" y="300">Direktlink</text>
  <rect x="492" y="326" width="188" height="72" rx="10" class="field"/>
  <text class="small" x="508" y="352">Beschreibungsauszug</text>
  <rect x="492" y="420" width="88" height="36" rx="10" class="button"/>
  <text class="buttonText" x="510" y="443">Prüfen</text>
  <rect x="590" y="420" width="90" height="36" rx="10" class="button"/>
  <text class="buttonText" x="606" y="443">Senden</text>
  <text class="small" x="492" y="492">Editierbar vor dem Senden</text>

  <path class="line" d="M726 318 C760 318 760 318 794 318" marker-end="url(#arrow)"/>

  <rect class="panel" x="812" y="128" width="260" height="382" rx="20"/>
  <text class="h2" x="840" y="166">3. JobMeta Dashboard</text>
  <rect x="840" y="194" width="206" height="44" rx="12" class="pill2"/>
  <text class="small" x="858" y="221">Job gespeichert</text>
  <rect x="840" y="262" width="206" height="46" rx="10" class="field"/>
  <text class="small" x="858" y="290">Score + Skill-Lücken</text>
  <rect x="840" y="326" width="206" height="46" rx="10" class="field"/>
  <text class="small" x="858" y="354">Notiz + nächste Aktion</text>
  <rect x="840" y="390" width="206" height="46" rx="10" class="field"/>
  <text class="small" x="858" y="418">Lokale SQLite-Datenbank</text>
  <rect x="840" y="460" width="150" height="28" rx="14" class="pill3"/>
  <text class="small" x="858" y="479">Keine Cloud-Pflicht</text>
</svg>
