<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="JobMeta public export mockup">
  <rect width="1200" height="760" fill="#f6f4ef"/>
  <rect x="100" y="80" width="1000" height="600" rx="20" fill="#fffcf6" stroke="#ded9cf"/>
