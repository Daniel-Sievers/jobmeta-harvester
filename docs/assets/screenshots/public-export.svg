  <text x="150" y="188" fill="#6d756f" font-family="Arial, sans-serif" font-size="18">Bereinigter Export für öffentliche Repositories</text>

  <rect x="150" y="236" width="260" height="58" rx="12" fill="#2f6f5e"/>
  <text x="280" y="272" fill="#fff" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Public-ZIP erzeugen</text>

  <rect x="150" y="340" width="400" height="240" rx="14" fill="#eef6f2" stroke="#c9ded5"/>
  <text x="180" y="384" fill="#1f2a24" font-family="Arial, sans-serif" font-size="22" font-weight="700">Bleibt im Paket</text>
